<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Skilled Intelligence - Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Global Skilled Intelligence</h1>
            <p class="subtitle">Skilled trade intelligence & live discovery service</p>
        </header>

        <!-- Stats Cards -->
        <section class="stats-grid" aria-label="Job Discovery Statistics">
            <div class="stat-card">
                <div class="stat-val" id="total-jobs">0</div>
                <div class="stat-lbl">Discovered</div>
            </div>
            <div class="stat-card">
                <div class="stat-val" id="cv-matches">0</div>
                <div class="stat-lbl">CV Matches</div>
            </div>
            <div class="stat-card">
                <div class="stat-val" id="visa-count">0</div>
                <div class="stat-lbl">Visa Sponsored</div>
            </div>
            <div class="stat-card">
                <div class="stat-val" id="permit-count">0</div>
                <div class="stat-lbl">Work Permit</div>
            </div>
            <div class="stat-card">
                <div class="stat-val" id="relo-count">0</div>
                <div class="stat-lbl">Relocation</div>
            </div>
        </section>

        <!-- Filter Controls -->
        <section class="filter-section">
            <label for="country-filter"><strong>Filter Country:</strong></label>
            <select id="country-filter">
                <option value="">All Countries</option>
            </select>
        </section>

        <!-- Jobs Feed -->
        <section aria-label="Job Listings">
            <h2>Latest Discovered Jobs</h2>
            <div class="job-list" id="job-list">
                <p>Scanning channels for jobs...</p>
            </div>
        </section>
    </div>

    <!-- Deferred script loading for optimum frontend performance -->
    <script src="/static/app.js" defer></script>
</body>
</html>
